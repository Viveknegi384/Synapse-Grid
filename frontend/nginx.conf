server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — send all unmatched routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the backend container so the browser
    # never needs to talk to port 5000 directly
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Required for SSE — disable buffering so events stream immediately
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
